services:
  # Backend API Service
  - type: web
    name: sentinel-backend
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install poetry && poetry install --no-dev --no-interaction
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
      - key: POSTGRES_HOST
        fromDatabase:
          name: sentinel-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: sentinel-postgres
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: sentinel-postgres
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: sentinel-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: sentinel-postgres
          property: password
      - key: REDIS_HOST
        fromService:
          name: sentinel-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: sentinel-redis
          type: redis
          property: port
      # Add these manually in Render dashboard:
      # - CLICKHOUSE_HOST
      # - CLICKHOUSE_PORT
      # - CLICKHOUSE_DB
      # - CLICKHOUSE_USER
      # - CLICKHOUSE_PASSWORD
      # - KAFKA_BOOTSTRAP_SERVERS
      # - TWITTER_BEARER_TOKEN
      # - RAPIDAPI_KEY
      # - REDDIT_CLIENT_ID
      # - REDDIT_CLIENT_SECRET

  # Frontend Static Site
  - type: web
    name: sentinel-frontend
    runtime: static
    plan: free
    region: oregon
    buildCommand: echo "Static files, no build needed"
    staticPublishPath: ./frontend
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        fromService:
          name: sentinel-backend
          type: web
          property: host

databases:
  # PostgreSQL Database
  - name: sentinel-postgres
    plan: free
    databaseName: sentinel_orm
    user: sentinel
    region: oregon

  # Redis Cache
  - name: sentinel-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
